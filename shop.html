<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧭指南针商店 - Minecraft 物资交易平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --mc-grass: #5B8C36;
            --mc-grass-dark: #4A752C;
            --mc-dirt: #8B5A2B;
            --mc-stone: #7D7D7D;
            --mc-stone-dark: #5C5C5C;
            --mc-wood: #6D4C28;
            --mc-wood-light: #8B6543;
            --mc-coal: #2D2D2D;
            --mc-iron: #ECECEC;
            --mc-gold: #FFFF55;
            --mc-diamond: #50E0D0;
            --mc-redstone: #FF3333;
            --mc-green: #55FF55;
            --mc-bg: #C6C6C6;
            --mc-white: #FFFFFF;
            --mc-black: #1E1E1E;
            --mc-text: #3F3F3F;
        }

        body {
            font-family: "Courier New", monospace;
            background: var(--mc-bg);
            color: var(--mc-text);
            line-height: 1.4;
            min-height: 100vh;
            padding: 10px;
            background-image: 
                linear-gradient(45deg, #00000008 25%, transparent 25%),
                linear-gradient(-45deg, #00000008 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #00000008 75%),
                linear-gradient(-45deg, transparent 75%, #00000008 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--mc-stone);
            border: 4px solid var(--mc-stone-dark);
            margin-bottom: 15px;
        }

        .header h1 { font-size: 1.2rem; color: var(--mc-white); text-shadow: 2px 2px var(--mc-black); }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--mc-redstone);
            color: white;
            border: 2px solid var(--mc-black);
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .hero {
            background: var(--mc-grass);
            border: 4px solid var(--mc-grass-dark);
            padding: 20px;
            margin-bottom: 15px;
        }

        .hero h2 { font-size: 1.5rem; margin-bottom: 8px; color: var(--mc-white); text-shadow: 2px 2px var(--mc-black); }
        .hero-subtitle { color: var(--mc-white); margin-bottom: 10px; }
        .hero-qq { font-weight: bold; color: var(--mc-gold); margin-bottom: 10px; }

        .btn {
            padding: 8px 16px;
            border: 3px solid var(--mc-black);
            background: var(--mc-stone);
            color: var(--mc-white);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.1s;
        }

        .btn:hover { background: var(--mc-stone-dark); transform: translate(-2px, -2px); box-shadow: 4px 4px var(--mc-black); }
        .btn:active { transform: translate(0, 0); box-shadow: none; }

        .highlights {
            background: var(--mc-wood);
            border: 4px solid var(--mc-wood-light);
            padding: 15px;
            margin-bottom: 15px;
            color: var(--mc-white);
        }

        .highlights h3 { font-size: 1.1rem; margin-bottom: 10px; text-shadow: 1px 1px var(--mc-black); }
        .highlights ul { list-style: none; padding-left: 10px; }
        .highlights li { padding: 4px 0; font-size: 0.85rem; }
        .highlights li::before { content: "■ "; color: var(--mc-gold); }

        .section-title { font-size: 1.3rem; margin-bottom: 15px; color: var(--mc-black); }

        .search-bar {
            width: 100%;
            padding: 10px;
            border: 3px solid var(--mc-stone-dark);
            background: var(--mc-white);
            font-family: inherit;
            margin-bottom: 15px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--mc-stone);
            border: 3px solid var(--mc-stone-dark);
            padding: 10px;
            cursor: pointer;
        }

        .product-card:hover { border-color: var(--mc-grass); }

        .product-icon { font-size: 2rem; margin-bottom: 5px; display: block; }
        .product-name { font-weight: bold; color: var(--mc-white); margin-bottom: 3px; font-size: 0.9rem; }
        .product-desc { font-size: 0.75rem; color: #AAAAAA; margin-bottom: 5px; }
        .product-price { font-weight: bold; color: var(--mc-gold); margin-bottom: 8px; font-size: 0.9rem; }

        .btn-add-cart {
            width: 100%;
            padding: 6px;
            background: var(--mc-grass);
            border: 2px solid var(--mc-black);
            color: var(--mc-white);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }

        .btn-add-cart:hover { background: var(--mc-grass-dark); }

        .floating-cart {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            background: var(--mc-grass);
            border: 3px solid var(--mc-black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 100;
        }

        .floating-cart:hover { background: var(--mc-grass-dark); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            padding: 10px;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--mc-bg);
            border: 4px solid var(--mc-black);
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--mc-black);
        }

        .modal-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; text-align: center; padding: 10px; background: var(--mc-stone); color: var(--mc-white); }

        .order-summary { background: var(--mc-white); padding: 10px; margin: 10px; border: 2px solid var(--mc-stone); }

        .order-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--mc-stone); font-size: 0.85rem; }
        .order-item-price { color: var(--mc-diamond); font-weight: bold; }

        .order-total { display: flex; justify-content: space-between; padding: 10px 0; font-weight: bold; font-size: 1rem; }
        .order-total-price { color: var(--mc-gold); font-size: 1.1rem; }

        .form-group { padding: 10px; }

        .form-label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }

        .form-input {
            width: 100%;
            padding: 8px;
            border: 2px solid var(--mc-stone-dark);
            background: var(--mc-white);
            font-family: inherit;
            margin-bottom: 8px;
        }

        .coordinate-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }

        .delivery-option {
            border: 2px solid var(--mc-stone);
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            background: var(--mc-white);
        }

        .delivery-option:hover, .delivery-option.selected { border-color: var(--mc-grass); background: #E8F5E9; }
        .delivery-option-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .delivery-name { font-weight: bold; font-size: 0.9rem; }
        .delivery-price { color: var(--mc-green); font-weight: bold; font-size: 0.85rem; }
        .delivery-desc { font-size: 0.75rem; color: #666; }

        .modal-actions { display: flex; gap: 8px; padding: 10px; }
        .btn-modal { flex: 1; padding: 10px; border: 3px solid var(--mc-black); font-family: inherit; font-weight: bold; cursor: pointer; }
        .btn-modal-primary { background: var(--mc-grass); color: var(--mc-white); }
        .btn-modal-primary:hover { background: var(--mc-grass-dark); }
        .btn-modal-secondary { background: var(--mc-stone); color: var(--mc-white); }

        .success-message { text-align: center; padding: 20px; }
        .success-icon { font-size: 3rem; margin-bottom: 10px; }
        .success-title { font-weight: bold; color: var(--mc-green); margin-bottom: 10px; }
        .screenshot-preview { margin: 10px; border: 3px solid var(--mc-black); }
        .screenshot-preview img { width: 100%; display: block; }

        .footer { text-align: center; padding: 20px; color: var(--mc-stone-dark); font-size: 0.8rem; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-content { max-height: 95vh; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🧭指南针商店</h1>
            <div class="cart-icon" onclick="openCartModal()">
                购物车
                <span class="cart-badge" id="cartCount">0</span>
            </div>
        </header>

        <section class="hero">
            <h2> Minecraft 物资大本营</h2>
            <p class="hero-subtitle">价格亲民，童叟无欺</p>
            <p class="hero-qq">QQ群: 1048082640</p>
            <button class="btn" onclick="scrollToProducts()">开始选购</button>
        </section>

        

        <section id="products">
            <h2 class="section-title">热销商品</h2>
            <input type="text" class="search-bar" placeholder="搜索商品..." id="searchInput" oninput="filterProducts()">
            <div class="products-grid" id="productsGrid"></div>
        </section>

        <footer class="footer">
            <p>© 2025 🧭指南针商店 - Minecraft 物资交易平台</p>
        </footer>
    </div>

    <div class="floating-cart" onclick="openCartModal()">
        🛒
        <span class="cart-badge" id="floatingCartCount">0</span>
    </div>

    <div class="modal" id="checkoutModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeCheckoutModal()">X</button>
            <div id="checkoutForm">
                <div class="modal-title">确认订单</div>
                <div class="order-summary">
                    <div id="orderItems"></div>
                    <div class="order-total">
                        <span>总计</span>
                        <span class="order-total-price" id="orderTotal">￥0.00</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">收货人ID *</label>
                    <input type="text" class="form-input" id="customerID" placeholder="请输入游戏ID">
                </div>
                <div class="form-group">
                    <label class="form-label">配送方式 *</label>
                    <div class="delivery-option" id="selfPickup" onclick="selectDelivery('selfPickup')">
                        <div class="delivery-option-header">
                            <span>🚶</span>
                            <div><div class="delivery-name">随机坐标自提</div><div class="delivery-price">免费</div></div>
                        </div>
                        <div class="delivery-desc">主世界10万内随机坐标埋藏自提</div>
                    </div>
                    <div class="delivery-option selected" id="homeDelivery" onclick="selectDelivery('homeDelivery')">
                        <div class="delivery-option-header">
                            <span>🚚</span>
                            <div><div class="delivery-name">送货上门</div><div class="delivery-price">免费</div></div>
                        </div>
                        <div class="delivery-desc">主世界8万内包邮，超出每2w/1R</div>
                    </div>
                </div>
                <div id="coordinateSection">
                    <div class="form-group">
                        <label class="form-label">收货坐标 *</label>
                        <div class="coordinate-inputs">
                            <input type="number" class="form-input" id="coordX" placeholder="X">
                            <input type="number" class="form-input" id="coordY" placeholder="Y">
                            <input type="number" class="form-input" id="coordZ" placeholder="Z">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">收货维度 *</label>
                        <select class="form-input" id="dimension">
                            <option value="主世界">主世界</option>
                            <option value="下界">下界</option>
                            <option value="末地">末地</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea class="form-input" id="orderNotes" rows="2" placeholder="特殊要求..."></textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn-modal btn-modal-secondary" onclick="closeCheckoutModal()">返回</button>
                    <button class="btn-modal btn-modal-primary" onclick="generateOrderImage()">生成订单</button>
                </div>
            </div>
            <div id="successView" style="display: none;">
                <div class="success-message">
                    <div class="success-icon">√</div>
                    <div class="success-title">订单已生成</div>
                    <p>请发送给群主 @级梦梦 完成下单</p>
                </div>
                <div class="screenshot-preview" id="screenshotPreview"></div>
                <div class="modal-actions">
                    <button class="btn-modal btn-modal-primary" onclick="resetCheckout()">完成</button>
                </div>
            </div>
        </div>
    </div>

    <canvas id="screenshotCanvas" style="display: none;"></canvas>

    <script>
        const products = [
            { name: "末地水晶", icon: "💎", desc: "End Crystal · 1盒", price: 5 },
            { name: "重生锚", icon: "🪨", desc: "Respawn Anchor · 1盒", price: 6 },
            { name: "附魔之瓶", icon: "🧪", desc: "经验瓶 xp · 1盒", price: 1 },

            { name: "金胡萝卜", icon: "🥕", desc: "Golden Carrot · 1盒", price: 0.5 },

            { name: "萤石", icon: "💡", desc: "Glowstone · 1盒", price: 1.5 },
            { name: "潜影壳", icon: "📦", desc: "居家旅行必备 · 1盒", price: 2 },
            { name: "下界合金", icon: "⚔️", desc: "Netherite · 1组", price: 8 },
            { name: "三速烟花", icon: "🎆", desc: "快速飞行 · 1盒", price: 0.5 },

            { name: "TNT", icon: "🧨", desc: "爆炸物 · 1盒", price: 3 },
            { name: "沙子", icon: "🏖️", desc: "Sand · 1盒", price: 1 },
            { name: "玻璃", icon: "🪟", desc: "Glass · 1盒", price: 1 },

            { name: "煤炭块", icon: "⬛", desc: "Coal Block · 1盒", price: 0.5 },
            { name: "铁块", icon: "⬜", desc: "Iron Block · 1盒", price: 2 },
            { name: "红石", icon: "🔴", desc: "Redstone · 1盒", price: 1 },
            { name: "金块", icon: "🟡", desc: "Gold Block · 1盒", price: 2 },
            { name: "绿宝石块", icon: "💚", desc: "Emerald Block · 1盒", price: 4 },
            { name: "钻石块", icon: "💎", desc: "Diamond Block · 1组", price: 1 },
            { name: "哭泣的黑曜石", icon: "😢", desc: "Crying Obsidian · 1盒", price: 1 },
            { name: "灵魂沙", icon: "🕳️", desc: "Soul Sand · 1盒", price: 0.1 },
            { name: "蜂蜜块", icon: "🍯", desc: "Honey Block · 1盒", price: 2 },
            { name: "海晶灯", icon: "🔦", desc: "Sea Lantern · 1盒", price: 2 },
            { name: "海晶砖", icon: "🧱", desc: "Prismarine Bricks · 1盒", price: 0.5 },
            { name: "蛙鸣灯", icon: "🐸", desc: "Frog Light · 1盒", price: 1 },

            { name: "火药", icon: "🧨", desc: "Gunpowder · 1盒", price: 0.1 },
            { name: "烈焰棒", icon: "🔥", desc: "Blaze Rod · 1盒", price: 0.1 },
            { name: "末影珍珠", icon: "🔮", desc: "Ender Pearl · 1盒", price: 0.1 },
            { name: "岩浆膏", icon: "🌋", desc: "Magma Cream · 1盒", price: 0.1 },

            { name: "凋零头", icon: "💀", desc: "Wither Skull · 1盒", price: 3 },
            { name: "不祥之瓶", icon: "🍾", desc: "Ominous Bottle · 1盒", price: 0.5 },
            { name: "玻璃瓶", icon: "🍶", desc: "Glass Bottle · 1盒", price: 0.5 },
            { name: "恶魂之泪", icon: "💧", desc: "Ghast Tear · 1盒", price: 0.5 },
            { name: "石英", icon: "💎", desc: "Nether Quartz · 1盒", price: 0.1 },
            { name: "凋零玫瑰", icon: "🥀", desc: "Wither Rose · 1盒", price: 1 },
            { name: "皮革", icon: "🟤", desc: "Leather · 1盒", price: 0.1 },
            { name: "线", icon: "🧵", desc: "String · 1盒", price: 0.1 },
            { name: "命名牌", icon: "🏷️", desc: "Name Tag · 1盒", price: 4 },
            { name: "冰块", icon: "🧊", desc: "Ice · 1盒", price: 1 },
            { name: "龙息", icon: "🐉", desc: "Dragon's Breath · 1组", price: 0.1 },
            { name: "混合补给", icon: "📦", desc: "补给物资 · 1盒", price: 2 },
            { name: "KIT", icon: "🎁", desc: "豪华装备礼包 · 1盒", price: 5 },
            { name: "地图画", icon: "🖼️", desc: "自定义图案 · 1格", price: 0.1 }
        ];

        let cartItems = [], selectedDelivery = 'homeDelivery', generatedImageDataUrl = null;

        // 初始化商品列表
        function initProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" data-name="${p.name}" data-desc="${p.desc}">
                    <span class="product-icon">${p.icon}</span>
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc">${p.desc}</div>
                    <div class="product-price">￥${p.price}</div>
                    <button class="btn-add-cart" onclick="addToCart('${p.name}', ${p.price})">加入购物车</button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            const item = cartItems.find(i => i.name === name);
            item ? item.quantity++ : cartItems.push({ name, price, quantity: 1 });
            updateCartCount();
        }

        function updateCartCount() {
            const count = cartItems.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            document.getElementById('floatingCartCount').textContent = count;
        }

        function openCartModal() {
            if (!cartItems.length) return alert('购物车为空');
            const itemsDiv = document.getElementById('orderItems');
            let total = 0;
            itemsDiv.innerHTML = cartItems.map(item => {
                const t = item.price * item.quantity;
                total += t;
                return `<div class="order-item"><span>${item.name}</span><span>x${item.quantity}</span><span class="order-item-price">￥${t.toFixed(2)}</span></div>`;
            }).join('');
            document.getElementById('orderTotal').textContent = `￥${total.toFixed(2)}`;
            updateCoordinateSection();
            document.getElementById('checkoutModal').classList.add('active');
        }

        function closeCheckoutModal() {
            document.getElementById('checkoutModal').classList.remove('active');
        }

        function selectDelivery(id) {
            selectedDelivery = id;
            document.querySelectorAll('.delivery-option').forEach(o => o.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
            updateCoordinateSection();
        }

        function updateCoordinateSection() {
            document.getElementById('coordinateSection').classList.toggle('hidden', selectedDelivery === 'selfPickup');
        }

        function validateForm() {
            const id = document.getElementById('customerID').value.trim();
            if (!id) return alert('请输入收货人ID');
            if (selectedDelivery === 'homeDelivery') {
                const c = ['coordX', 'coordY', 'coordZ'].map(v => document.getElementById(v).value);
                if (!c[0] || !c[1] || !c[2]) return alert('请填写完整坐标');
            }
            return true;
        }

        async function generateOrderImage() {
            if (!validateForm()) return;
            const canvas = document.getElementById('screenshotCanvas'), ctx = canvas.getContext('2d');
            canvas.width = 600;
            canvas.height = 700 + cartItems.length * 30;

            // 背景
            ctx.fillStyle = '#5B8C36';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 标题
            ctx.fillStyle = 'white';
            ctx.font = 'bold 36px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('🧭指南针商店 - 订单确认', canvas.width / 2, 50);

            // 白色区域
            ctx.fillStyle = 'white';
            ctx.fillRect(30, 80, canvas.width - 60, canvas.height - 120);

            // 商品列表
            ctx.fillStyle = '#3F3F3F';
            ctx.font = '18px Courier New';
            ctx.textAlign = 'left';
            let y = 120;
            let total = 0;
            cartItems.forEach(item => {
                const t = item.price * item.quantity;
                total += t;
                ctx.fillText(`${item.name} x${item.quantity}`, 50, y);
                ctx.fillText(`￥${t.toFixed(2)}`, 450, y);
                y += 30;
            });

            // 总计
            ctx.strokeStyle = '#7D7D7D';
            ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(550, y); ctx.stroke();
            y += 30;
            ctx.font = 'bold 20px Courier New';
            ctx.fillStyle = '#FFFF55';
            ctx.fillText(`总计: ￥${total.toFixed(2)}`, 50, y);

            // 收货信息
            y += 50;
            ctx.fillStyle = '#3F3F3F';
            ctx.font = 'bold 16px Courier New';
            ctx.fillText(`收货人: ${document.getElementById('customerID').value}`, 50, y);
            y += 25;
            if (selectedDelivery === 'homeDelivery') {
                ctx.fillText(`坐标: X:${document.getElementById('coordX').value} Y:${document.getElementById('coordY').value} Z:${document.getElementById('coordZ').value}`, 50, y);
                y += 25;
                ctx.fillText(`维度: ${document.getElementById('dimension').value}`, 50, y);
                y += 25;
            }
            ctx.fillText(`配送: ${selectedDelivery === 'selfPickup' ? '随机自提' : '送货上门'}`, 50, y);

            // 提示
            ctx.fillStyle = '#5B8C36';
            ctx.textAlign = 'center';
            ctx.font = 'bold 14px Courier New';
            ctx.fillText('请联系群主 @级梦梦 完成下单', canvas.width / 2, canvas.height - 40);

            generatedImageDataUrl = canvas.toDataURL('image/png');
            document.getElementById('checkoutForm').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
            document.getElementById('screenshotPreview').innerHTML = `<img src="${generatedImageDataUrl}">`;
        }

        function resetCheckout() {
            ['customerID', 'coordX', 'coordY', 'coordZ', 'orderNotes'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('dimension').value = '主世界';
            selectedDelivery = 'homeDelivery';
            document.querySelectorAll('.delivery-option').forEach(o => o.classList.remove('selected'));
            document.getElementById('homeDelivery').classList.add('selected');
            document.getElementById('successView').style.display = 'none';
            document.getElementById('checkoutForm').style.display = 'block';
            cartItems = [];
            updateCartCount();
            closeCheckoutModal();
            alert('订单已完成，期待再次光临！');
        }

        function scrollToProducts() { document.getElementById('products').scrollIntoView({ behavior: 'smooth' }); }

        function filterProducts() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(c => {
                const match = c.getAttribute('data-name').toLowerCase().includes(s) || c.getAttribute('data-desc').toLowerCase().includes(s);
                c.style.display = match ? 'block' : 'none';
            });
        }

        document.getElementById('checkoutModal').addEventListener('click', e => { if (e.target.id === 'checkoutModal') closeCheckoutModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCheckoutModal(); });

        initProducts();
    </script>
</body>
</html>
